name: Go Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cc: gcc
          - goos: linux
            goarch: arm64
            zig_target: aarch64-linux-musl
          - goos: darwin
            goarch: amd64
            zig_target: x86_64-macos
          - goos: darwin
            goarch: arm64
            zig_target: aarch64-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Install Zig
        if: matrix.zig_target != ''
        uses: mlugg/setup-zig@v1

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.zig_target != '' && format('zig cc -target {0}', matrix.zig_target) || matrix.cc }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/bonztm/agent-memory-manager/internal/buildinfo.Version=${SHORT_SHA}"
          LDFLAGS="$LDFLAGS -X github.com/bonztm/agent-memory-manager/internal/buildinfo.CommitShort=${SHORT_SHA}"
          mkdir -p dist
          for bin in amm amm-mcp amm-http; do
            go build -tags fts5 -ldflags "$LDFLAGS" -o "dist/${bin}" "./cmd/${bin}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ env.SHORT_SHA }}
          tags: |
            ghcr.io/bonztm/agent-memory-manager:${{ env.SHORT_SHA }}
            ghcr.io/bonztm/agent-memory-manager:edge
