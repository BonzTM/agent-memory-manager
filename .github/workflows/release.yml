name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  VERSION: ${{ github.event.release.tag_name }}

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cc: gcc
          - goos: linux
            goarch: arm64
            zig_target: aarch64-linux-musl
          - goos: darwin
            goarch: amd64
            zig_target: x86_64-macos
          - goos: darwin
            goarch: arm64
            zig_target: aarch64-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Install Zig
        if: matrix.zig_target != ''
        uses: mlugg/setup-zig@v1

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.zig_target != '' && format('zig cc -target {0}', matrix.zig_target) || matrix.cc }}
        run: |
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/bonztm/agent-memory-manager/internal/buildinfo.Version=${{ env.VERSION }}"
          LDFLAGS="$LDFLAGS -X github.com/bonztm/agent-memory-manager/internal/buildinfo.CommitShort=${GITHUB_SHA::7}"
          mkdir -p dist
          for bin in amm amm-mcp amm-http; do
            go build -tags fts5 -ldflags "$LDFLAGS" -o "dist/${bin}" "./cmd/${bin}"
          done
          cd dist && tar czf "../amm-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" amm amm-mcp amm-http

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.VERSION }}" "amm-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" --clobber

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/bonztm/agent-memory-manager:${{ env.VERSION }}
            ghcr.io/bonztm/agent-memory-manager:latest
