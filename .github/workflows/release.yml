name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  VERSION: ${{ github.event.release.tag_name }}

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/bonztm/agent-memory-manager/internal/buildinfo.Version=${{ env.VERSION }}"
          LDFLAGS="$LDFLAGS -X github.com/bonztm/agent-memory-manager/internal/buildinfo.CommitShort=${GITHUB_SHA::7}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p dist/standard dist/builtin-embeddings
          for bin in amm amm-mcp amm-http; do
            go build -ldflags "$LDFLAGS" -o "dist/standard/${bin}${EXT}" "./cmd/${bin}"
            go build -tags builtin_embeddings -ldflags "$LDFLAGS" -o "dist/builtin-embeddings/${bin}${EXT}" "./cmd/${bin}"
          done

      - name: Package release archive
        run: |
          package_variant() {
            variant_dir="$1"
            archive_suffix="$2"
            archive="amm-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}${archive_suffix}"
            if [ "${{ matrix.goos }}" = "windows" ]; then
              (
                cd "dist/${variant_dir}"
                zip -q "../../${archive}.zip" amm.exe amm-mcp.exe amm-http.exe
              )
            else
              (
                cd "dist/${variant_dir}"
                tar czf "../../${archive}.tar.gz" amm amm-mcp amm-http
              )
            fi
          }

          package_variant standard ""
          package_variant builtin-embeddings "-builtin-embeddings"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          upload_variant() {
            archive="amm-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}$1"
            if [ "${{ matrix.goos }}" = "windows" ]; then
              gh release upload "${{ env.VERSION }}" "${archive}.zip" --clobber
            else
              gh release upload "${{ env.VERSION }}" "${archive}.tar.gz" --clobber
            fi
          }

          upload_variant ""
          upload_variant "-builtin-embeddings"

  npm-openclaw:
    name: Publish OpenClaw Plugin
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publisher support
        run: |
          if ! npm install -g npm@latest 2>/dev/null; then
            echo "Pre-installed npm broken, bootstrapping via npx"
            npx -y npm@latest install -g npm@latest
          fi

      - name: Set version from tag
        working-directory: examples/openclaw
        run: |
          npm version "${{ env.VERSION }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm with provenance
        working-directory: examples/openclaw
        run: npm publish --access public --provenance

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - tag_suffix: ""
            go_build_tags: ""
          - tag_suffix: "-builtin-embeddings"
            go_build_tags: "builtin_embeddings"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            GO_BUILD_TAGS=${{ matrix.go_build_tags }}
          tags: |
            ghcr.io/bonztm/agent-memory-manager:${{ env.VERSION }}${{ matrix.tag_suffix }}
            ghcr.io/bonztm/agent-memory-manager:latest${{ matrix.tag_suffix }}
