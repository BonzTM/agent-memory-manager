apiVersion: v1
kind: Secret
metadata:
  name: amm-api-key
  namespace: default # Change to your target namespace.
  labels:
    app: agent-with-amm
    component: amm
type: Opaque
data:
  api-key: <base64-encoded-key>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: amm-data
  namespace: default # Change to your target namespace.
  labels:
    app: agent-with-amm
    component: amm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-with-amm
  namespace: default # Change to your target namespace.
  labels:
    app: agent-with-amm
    component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-with-amm
      component: agent
  template:
    metadata:
      labels:
        app: agent-with-amm
        component: agent
    spec:
      containers:
        - name: agent
          image: your-agent-image:latest
          env:
            - name: AMM_API_URL
              value: http://localhost:8080
            - name: AMM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: amm-api-key
                  key: api-key
            - name: AMM_PROJECT_ID
              value: your-project-id
            - name: AMM_SESSION_ID
              value: ""
          # resources:
          #   requests:
          #     cpu: 100m
          #     memory: 128Mi
          #   limits:
          #     cpu: 500m
          #     memory: 512Mi

        - name: amm
          image: ghcr.io/bonztm/agent-memory-manager:latest
          command: ["amm-http"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AMM_HTTP_ADDR
              value: ":8080"
            - name: AMM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: amm-api-key
                  key: api-key
            - name: AMM_DB_PATH
              value: /data/amm.db
            - name: AMM_STORAGE_BACKEND
              value: sqlite
            # PostgreSQL alternative:
            # - name: AMM_STORAGE_BACKEND
            #   value: postgres
            # - name: AMM_POSTGRES_DSN
            #   value: postgres://user:password@postgres.default.svc.cluster.local:5432/amm?sslmode=disable
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: amm-data
