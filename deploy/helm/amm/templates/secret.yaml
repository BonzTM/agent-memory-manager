{{- if not .Values.secrets.existingSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "amm.secretName" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amm.secretName" . }}
  labels:
    {{- include "amm.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existing $existing.data }}
  AMM_API_KEY: {{ index $existing.data "AMM_API_KEY" }}
  {{- else }}
  AMM_API_KEY: {{ .Values.secrets.apiKey | default (randAlphaNum 32) | b64enc | quote }}
  {{- end }}
  {{- if and (eq .Values.backend "postgres") .Values.postgres.dsn }}
  AMM_POSTGRES_DSN: {{ .Values.postgres.dsn | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.summarizerApiKey }}
  AMM_SUMMARIZER_API_KEY: {{ .Values.secrets.summarizerApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.reviewApiKey }}
  AMM_REVIEW_API_KEY: {{ .Values.secrets.reviewApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.embeddingsApiKey }}
  AMM_EMBEDDINGS_API_KEY: {{ .Values.secrets.embeddingsApiKey | b64enc | quote }}
  {{- end }}
{{- end }}
